<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wiom Partner — PayG Flow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="flow-label">Partner / Admin Flow</div>

<div id="app">

  <!-- ======== Home Screen (always visible) ======== -->
  <div id="screen-home" class="screen active">
    <div class="home-header">
      <div class="home-header-left">
        <div class="partner-icon">P+</div>
        <div class="home-greeting">नमस्ते, रोहित</div>
      </div>
      <div class="home-header-right">
        <div class="rating-badge">&#9733; 4.8</div>
        <div class="menu-icon">&#9776;</div>
      </div>
    </div>

    <div class="home-tabs">
      <div class="home-tab active">नेटवर्क बढ़ायें</div>
      <div class="home-tab">पैसा कमायें</div>
    </div>

    <div class="home-content">
      <div class="booking-card">
        <div>
          <div class="booking-count">08</div>
          <div class="booking-avatars">
            <div class="avatar-dot"></div>
            <div class="avatar-dot"></div>
            <div class="avatar-dot"></div>
            <div class="avatar-dot"></div>
          </div>
          <div class="booking-label">कस्टमर प्रतीक्षा कर रहे हैं</div>
        </div>
        <div class="booking-arrow">&rarr;</div>
      </div>

      <div class="home-stat">
        <div class="home-stat-label">कुल एक्टिव कस्टमर</div>
        <div class="home-stat-value">276</div>
      </div>
    </div>
  </div>

  <!-- ======== Full-screen Modal (intro → video → quiz → success) ======== -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-sheet">

      <!-- Step 1: Intro / Blocker -->
      <div id="step-intro" class="modal-step">
        <div class="modal-step-content intro-content">
          <div id="intro-title" class="popup-title"></div>
          <div id="intro-body" class="popup-body"></div>
          <button id="btn-start" class="btn-primary"></button>
        </div>
      </div>

      <!-- Step 2: Video -->
      <div id="step-video" class="modal-step">
        <div class="modal-step-content video-content">
          <div id="video-title" class="video-title"></div>

          <div id="video-wrapper" class="video-wrapper" style="display:none;">
            <video id="video-player" controls playsinline preload="metadata">
              Your browser does not support video.
            </video>
          </div>

          <div id="video-placeholder" class="video-placeholder">
            <div class="video-placeholder-icon">&#9654;</div>
            <div class="video-placeholder-text">कोई वीडियो अपलोड नहीं हुआ</div>
            <div class="video-placeholder-text" style="font-size:12px; color:var(--neutral-300);">Admin Panel से वीडियो जोड़ें</div>
          </div>

          <div class="video-hint">वीडियो देखने के बाद क्विज़ शुरू होगा</div>
          <button id="btn-start-quiz" class="btn-primary">क्विज़ शुरू करें &rarr;</button>
        </div>
      </div>

      <!-- Step 3: Quiz -->
      <div id="step-quiz" class="modal-step">
        <div class="quiz-progress-bar">
          <div id="progress-fill" class="quiz-progress-fill" style="width:10%"></div>
        </div>
        <div class="modal-step-content quiz-content">
          <div id="question-counter" class="quiz-counter">1/11</div>
          <div id="question-text" class="quiz-question"></div>
          <div id="options-container" class="quiz-options"></div>
          <div id="feedback-box" class="quiz-feedback"></div>
          <div id="action-box" class="quiz-action"></div>
        </div>
      </div>

      <!-- Step 4: Success -->
      <div id="step-success" class="modal-step">
        <div class="modal-step-content success-content">
          <div class="success-badge">
            <div class="badge-inner">
              <span class="badge-icon">PayG</span>
              <span class="badge-label">Certified</span>
            </div>
          </div>

          <div id="success-title" class="success-title"></div>
          <div id="success-subtitle" class="success-subtitle"></div>
          <div id="success-payout" class="success-payout"></div>
          <div id="success-note" class="success-note"></div>
          <button id="btn-close-modal" class="btn-primary"></button>
        </div>
      </div>

    </div>
  </div>

  <!-- ======== Restart Toast ======== -->
  <div id="restart-toast" class="restart-toast">
    कोई बात नहीं! चलो फिर से शुरू करते हैं
  </div>

</div>

<script>var flowType = 'partner';</script>
<script src="quiz-data.js"></script>
<script src="app.js"></script>
</body>
</html>
